<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nuestros Shows!</title>

    <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: rgb(253, 253, 253);
            margin: 0;
            padding: 0;
            font-family: 'Creepster', cursive;
        }

        .logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 150px;
            z-index: 100;
        }

        .contenido {
            display: flex;
            justify-content: center; 
            padding-top: 60px;
            align-items: center;      
        }

        h1 {
            color: rgb(10, 9, 9);
            font-size: 70px;
            text-shadow: 4px 4px 15px rgb(255, 255, 255); 
            margin: 0;
            text-align: center;
        }
       .ventana-shows {
            background-color: black; 
            color: white;  
            padding: 40px;
            border-radius: 20px;
            right: 100%;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 0; 
            text-align: center
        }
        

        ul {
            list-style-type: none;
            padding: 0; 
            text-align: center; 
            font-size: 24px;
        }

        li {
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: block; 
        }
.boton-regresar {
    position: fixed;
    bottom: 500px;
    left: 1325px;
    z-index: 200; 
    transition: transform 0.3s ease;
}

.boton-regresar img {
    width: 190px;
    cursor: pointer;
}
.boton-regresar:hover {
    transform: scale(1.1);
}

    </style>
</head>

<body>
    <img src="img/logob.n.png" alt="Logo de UteTriC Circus" class="logo">

    <a href="index.html" class="boton-regresar">
    <img src="img/regresar1.png" alt="Volver al inicio">
</a>

    <div id="prin" class="contenido">
        <h1>¡Shows principales!</h1>
    </div>
    <center>
    <div class="ventana-shows">
            <ul>
                <li>Los saja boys-10:00 hrs</li>

            </ul>
        </div>
        </center>
    </div>

</body>
</html>

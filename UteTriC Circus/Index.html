<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UteTriC Circus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }

        .capa { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

        .capa-gradas { 
            background-image: url('img/Fondo1.png'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: 100% 100%; 
            z-index: 1; 
        }

        .capa-telon { 
            background-image: url('img/fondo2.png'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: cover; 
            imagene-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            z-index: 2; 
            transform: translateY(-100vh);
            animation: soloCaer 1.5s ease-out forwards;
    animation-delay: 0.4s;
        }

        .capa-interfaz { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 3; pointer-events: auto; 
        }

        .cartel-principal {
            position: absolute;
            top: 62%; left: -2%; width: 410px;
            animation: entrarCartel 1.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            animation-delay: 1.0s; opacity: 0; 
        }

        .shows {
            position: absolute;
            top: 45%; left: 70%; width: 300px;
            animation: entrarshows 1.5s cubic-bezier(0.20, 0.50, 0.36, 1) forwards;
            animation-delay: 1.0s; opacity: 0;
        }

        .flecha {
            position: fixed; top: 50%; background: none; border: none; cursor: pointer;
            width: 100px; z-index: 4;
            animation: entrarCartel 1.0s cubic-bezier(0.40, 0.70, 0.30, 1) forwards;
            animation-delay: 1.0s; opacity: 0;
        }

        .f-izquierda { position: absolute; top: 50%; left: 55%; width: 250px; z-index: 4; cursor: pointer; }

        .f-derecha { position: absolute; top: 68%; left: 55%; width: 250px; z-index: 4; cursor: pointer; }

        .ventana-info {
            position: absolute; top: 20%; left: 30%; width: 40%;
            background: rgba(0, 0, 0, 0.85); border: 2px solid #8b0000;
            color: white; padding: 20px; display: none;
        }

        /* ANIMACIONES */
       @keyframes soloCaer {
    0% { transform: translateY(-100vh); }
    100% { transform: translateY(0); }
}

        @keyframes entrarCartel {
            0% { transform: translateX(100%); opacity: 1; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes entrarshows {
            0% { transform: translateX(100%); opacity: 1; }
            100% { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="capa capa-gradas"></div>

    <div class="capa capa-telon"></div>

    <div class="capa capa-interfaz">

        <img src="img/cartel.png" class="cartel-principal">

<a href="Shows.html">
        <img src="img/shows.png" class="shows">
</a>

        <button class="flecha f-izquierda" onclick="abrirInfo('proyecto')">
            <img src="img/f-izquierda.png" style="width:100%;">
        </button>

        <button class="flecha f-derecha" onclick="abrirInfo('ra')">
            <img src="img/f-derecha.png" style="width:100%;">
        </button>

        <div id="ventana-info" class="ventana-info">
            <button class="cerrar" onclick="cerrarInfo()">X</button>
            <div id="contenido-info"></div>
        </div>
    </div>

    <script>
        function abrirInfo(seccion) {
            const ventana = document.getElementById('ventana-info');
            const contenido = document.getElementById('contenido-info');
           
            if (seccion === 'proyecto') {
                contenido.innerHTML = "<h2>Proyecto</h2><p>Apoco si mi amor?</p>";
            }  else if (seccion === 'ra') {
                contenido.innerHTML = "<h2>Realidad Aumentada</h2><p>Tu madre tiene una p</p>";
            }
            ventana.style.display = 'block';
        }

        function cerrarInfo() {
            document.getElementById('ventana-info').style.display = 'none';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
    <title>UteTriC Circus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background-color: black; }

        .capa { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

        .capa-gradas { 
            background-image: url('img/Fondo1.jpg'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: 100% 100%; 
            z-index: 1; 
        }

        .capa-telon { 
            background-image: url('img/fondo2.png'); 
            background-repeat: no-repeat; 
            background-position: center center; 
            background-size: cover; 
            z-index: 2; 
            transform: translateY(-100vh);
            animation: soloCaer 1.5s ease-out forwards;
            animation-delay: 0.4s;
        }

        .capa-interfaz { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 3; pointer-events: auto; 
        }

        .cartel-principal {
            position: absolute;
            top: -2%; left: 41%; width: 235px;
            transform: translateY(-100vh);
            animation: soloCaer 1.5s ease-out forwards;
            animation-delay: 0.4s; 
        }

        .shows {
            position: absolute;
            top: 45%; 
            width: 300px;
            animation: entrarshows 1.5s cubic-bezier(0.20, 0.50, 0.36, 1) forwards;
            animation-delay: 1.0s; 
            opacity: 0;
            display: block;
            transition: transform 0.4s ease, box-shadow 0.4s ease; 
            transform: scale(1);
            will-change: transform;
        }

        .shows:hover {
            transform: scale(1.05);
            cursor: pointer;
        }
        
        .contenedor-flecha {
            position: absolute;
            z-index: 4;
            animation: entrarFlechas 1.0s cubic-bezier(0.20, 0.55, 0.30, 1) forwards;
            animation-delay: 1.0s; 
            opacity: 0;
        }

        .flecha {
            background: none; 
            border: none; 
            cursor: pointer;
            width: 270px;
            transition: transform 0.3s ease-in-out;
            transform-origin: center;
        }

        .flecha:hover {
            transform: scale(1.1); 
        }

        .f-izquierda { top: 47%; left: 15%;
        clip-path: polygon(0% 25%, 65% 25%, 65% 0%, 100% 50%, 65% 100%, 65% 75%, 0% 75%);
        } 
        .f-derecha { top: 65%; left: 15%; 
        clip-path: polygon(100% 25%, 35% 25%, 35% 0%, 0% 50%, 35% 100%, 35% 75%, 100% 75%);
        }

        .ventana-info {
            position: absolute; 
            top: 20%; 
            left: 30%; 
            width: 40%;
            background-color: #d1aa7d;
            border: 4px solid #5f0000; 
            color: #000000;
            padding: 30px; 
            display: block;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s;
            z-index: 10;
            border-radius: 15px;
            font-family: 'Rye', cursive;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
            max-height: 70vh;
             overflow-y: auto;
        }
        
        .ventana-info.activa {
            opacity: 1;
            visibility: visible;
            font-family: 'Rye', cursive;
        }
       .ventana-info h2 {
            font-size: 32px;
            color: #5f0000;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 2px solid #5f0000;
            padding-bottom: 10px;
            font-family: 'Rye', cursive;
        }

        .ventana-info h3 {
            font-size: 22px;
            color: #4a0000;
            margin-top: 20px;
            margin-bottom: 5px;
            font-family: 'Rye', cursive;
        }

        .ventana-info p {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: justify;
            line-height: 1.6;
            font-family: 'Rye', cursive;
        }

        .cerrar {
            background-color: #5f0000;
            color: #d1aa7d;
            border: none;
            padding: 3px 3px;
            cursor: pointer;
            font-weight: bold;
            float: right;
        }

        /* ANIMACIONES */
        @keyframes soloCaer {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(0); }
        }

        @keyframes entrarFlechas {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes entrarshows {
            0% { left: 100%; opacity: 1; }
            100% { left: 70%; opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="capa capa-gradas"></div>
    <div class="capa capa-telon"></div>

    <div class="capa capa-interfaz">
        <img src="img/cartel.png" class="cartel-principal">

        <a href="Shows.html">
            <img src="img/shows.png" class="shows">
        </a>

        <div class="contenedor-flecha f-izquierda">
            <button class="flecha" onclick="abrirInfo('proyecto')">
                <img src="img/f-izquierda.png" style="width:100%;">
            </button>
        </div>

        <div class="contenedor-flecha f-derecha">
            <button class="flecha" onclick="abrirInfo('ra')">
                <img src="img/f-derecha.png" style="width:100%;">
            </button>
        </div>

        <div id="ventana-info" class="ventana-info">
            <button class="cerrar" onclick="cerrarInfo()">X</button>
            <div id="contenido-info"></div>
        </div>
    </div>

    <script>
        function abrirInfo(seccion) {
            const ventana = document.getElementById('ventana-info');
            const contenido = document.getElementById('contenido-info');
            
            if (seccion === 'proyecto') {
                contenido.innerHTML = `
                    <h2>Proyecto</h2>
                    <h3>Misión</h3>
                    <p>La organización busca transformar el aprendizaje y la convivencia en una experiencia artística e inmersiva. Su objetivo es convertir lo diferente en un espectáculo.</p>
                    <h3>Visión</h3>
                    <p>Aspiramos a ser un referente global en la educación artística, reconocido por nuestra capacidad para inspirar y empoderar a individuos de todas las edades.</p>
                    <h3>Valores</h3>
                    <p>Creatividad, Inclusión, Disciplina, Pasión, Colaboración, Innovación y Sostenibilidad.</p>
                `;
            } else if (seccion === 'ra') {
                contenido.innerHTML = `
                    <h2>Realidad Aumentada</h2>
                    <p>Se buso desarrollar una aplicación móvil de realidad aumentada para el evento Utetric Circus que permita a los asistentes localizar y capturar personajes virtuales distribuidos en distintas zonas del lugar, mediante el uso de geolocalización y la cámara del dispositivo, con el fin de gamificar la experiencia del evento y aumentar la interacción del público con el espacio y los personajes del circo.</p>
                    <h3>Objetivo genearal</h3>
                    <p>"Llevar a cabo de manera organizada el proyecto temático"Ute TriC Circus", integrando una página web interactiva, elementos de realidad aumentada y un stand temático inspirado en la estética de Tim Burton, mediante la planeación, diseño y recopilación de evidencias de cada equipo, con el fin de presentar una experiencia funcional, creativa, interactiva y comprensible para los visitantes durante la exposición del 6 al 10 de julio.</p>
                `;
            }
            ventana.classList.add('activa');
        }
        function cerrarInfo() {
            document.getElementById('ventana-info').classList.remove('activa');
        }
    </script>
</body>
</html>
